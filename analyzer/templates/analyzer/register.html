<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - AI Resume Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
        }
        .auth-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color:white;
        }
        .form-control {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            padding: 12px;
            border-radius: 10px;
        }
        .form-control:focus {
            background-color: rgba(15, 23, 42, 0.8);
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
            color: #ffffff;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #38bdf8, #2563eb);
            color: white;
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
            color: white;
        }
        .text-muted-custom {
            color: #94a3b8;
        }
        .brand-logo {
            font-weight: 700;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-10 col-sm-8 col-md-6 col-lg-4">
                
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show mb-4 border-0 shadow" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                <div class="text-center mb-4">
                    <h2 class="brand-logo mb-1">AI Resume Analyzer</h2>
                    <p class="text-muted-custom small">Optimize your recruitment workflows instantly</p>
                </div>

                <div class="card auth-card p-4 shadow-lg">
                    <h4 class="fw-bold mb-4 text-center ">Get Started</h4>
                    <form method="POST" id="registration-form">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="username" class="form-label text-muted-custom small fw-semibold">Username</label>
                            <input type="text" name="username" id="username" class="form-control" placeholder="Choose a unique handle" required autocomplete="off">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label text-muted-custom small fw-semibold">Email Address</label>
                            <input type="email" name="email" id="email" class="form-control" placeholder="name@company.com" required autocomplete="email">
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label text-muted-custom small fw-semibold">Password</label>
                            <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-gradient w-100 mb-2">Create Account</button>
                    </form>
                    <p class="text-center mt-3 mb-0 small text-muted-custom">
                        Already have an account? <a href="{% url 'login' %}" class="text-info text-decoration-none fw-semibold">Login here</a>
                    </p>
                </div>
                
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Double check on submission to guarantee no empty parameters hit your Django backend
        document.getElementById('registration-form').addEventListener('submit', function(e) {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !email || !password) {
                e.preventDefault();
                alert('Safety Check: All parameters must be completely filled out before creation.');
            }
        });
    </script>
</body>
</html>
